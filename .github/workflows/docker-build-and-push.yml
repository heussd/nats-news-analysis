name: Docker build & push

on:
    push:
        branches:
            - 'main'
        paths-ignore:
            - '**.md'
            - 'architecture.drawio'
            - 'architecture.drawio.svg'
            - '**.png'
            - '**/*.http'
jobs:
    # Detect which build contexts actually changed so we only rebuild those.
    changes:
        runs-on: ubuntu-latest
        outputs:
            golang: ${{ steps.filter.outputs.golang }}
            python: ${{ steps.filter.outputs.python }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - name: Detect changed paths
              uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      golang:
                          - 'golang/**'
                          - 'compose.yml'
                          - 'compose.override.yml'
                      python:
                          - 'python/**'
                          - 'compose.yml'
                          - 'compose.override.yml'

    bake:
        needs: changes
        if: ${{ needs.changes.outputs.golang == 'true' || needs.changes.outputs.python == 'true' }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - # Add support for more platforms with QEMU (optional)
              # https://github.com/docker/setup-qemu-action
              name: Set up QEMU
              uses: docker/setup-qemu-action@v3
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3
            - name: Log in to the GitHub Container registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # Only the Go images are (re)built when something under golang/ changed.
            # The GitHub Actions cache lets unchanged layers (go mod download, the
            # shared base stage) be reused across runs and across services.
            - name: Build and push Go services
              if: ${{ needs.changes.outputs.golang == 'true' }}
              uses: docker/bake-action@v7
              with:
                  source: .
                  files: |
                      compose.yml
                      compose.override.yml
                  targets: |
                      feed-feeder
                      article-feeder
                      news-feeder
                      n-gram-analysis
                      keyword-matcher
                      raindrop-integration
                  push: true
                  set: |
                      *.cache-from=type=gha
                      *.cache-to=type=gha,mode=max

            # Only the Python images are (re)built when something under python/ changed.
            - name: Build and push Python services
              if: ${{ needs.changes.outputs.python == 'true' }}
              uses: docker/bake-action@v7
              with:
                  source: .
                  files: |
                      compose.yml
                      compose.override.yml
                  targets: |
                      nats-indexer
                      search-mcp-server
                      search-rest-server
                  push: true
                  set: |
                      *.cache-from=type=gha
                      *.cache-to=type=gha,mode=max
